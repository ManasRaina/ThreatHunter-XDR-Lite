<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ThreatIntel Platform{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>

<body>

    <div class="d-flex" id="wrapper">

        <!-- ── Sidebar ──────────────────────────────────────────────── -->
        <nav id="sidebar" class="d-flex flex-column p-3">
            <div class="sidebar-brand d-flex align-items-center mb-4">
                <i class="bi bi-shield-lock-fill me-2 text-danger fs-4"></i>
                <span class="fw-bold fs-5">ThreatIntel<span class="text-danger">OS</span></span>
            </div>

            <ul class="nav nav-pills flex-column gap-1">
                <li class="nav-item">
                    <a href="/" class="nav-link {% if active == 'dashboard' %}active{% endif %}">
                        <i class="bi bi-speedometer2 me-2"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/iocs" class="nav-link {% if active == 'iocs' %}active{% endif %}">
                        <i class="bi bi-search me-2"></i>IOC Explorer
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/feeds" class="nav-link {% if active == 'feeds' %}active{% endif %}">
                        <i class="bi bi-rss me-2"></i>Threat Feeds
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/rules" class="nav-link {% if active == 'rules' %}active{% endif %}">
                        <i class="bi bi-file-earmark-code me-2"></i>Detection Rules
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/pipeline" class="nav-link {% if active == 'pipeline' %}active{% endif %}">
                        <i class="bi bi-diagram-3 me-2"></i>Pipeline
                    </a>
                </li>
            </ul>

            <div class="mt-auto pt-3 border-top border-secondary">
                <small class="text-muted d-block">
        <i class="bi bi-circle-fill text-success me-1" style="font-size:0.5rem"></i>
        System Online
      </small>
            </div>
        </nav>

        <!-- ── Main content ─────────────────────────────────────────── -->
        <div id="page-content" class="flex-grow-1 d-flex flex-column">

            <!-- Topbar -->
            <nav class="topbar d-flex align-items-center px-4 py-2 border-bottom border-secondary">
                <span class="text-muted small">{% block breadcrumb %}Dashboard{% endblock %}</span>
                <div class="ms-auto d-flex align-items-center gap-3">
                    <span id="live-clock" class="text-muted small font-monospace"></span>
                    <a href="/pipeline" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-play-fill me-1"></i>Run Pipeline
                    </a>
                </div>
            </nav>

            <!-- Flash / toast area -->
            <div id="toast-area" class="position-fixed bottom-0 end-0 p-3" style="z-index:9999"></div>

            <!-- Page body -->
            <main class="flex-grow-1 p-4">
                {% block content %}{% endblock %}
            </main>

            <footer class="text-center text-muted small py-2 border-top border-secondary">
                ThreatIntel Platform &copy; 2025 &mdash; Built with Python, Flask &amp; SQLite
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

    <script>
        // Live clock
        function updateClock() {
            const el = document.getElementById('live-clock');
            if (el) el.textContent = new Date().toUTCString().replace(' GMT', '') + ' UTC';
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Toast helper
        function showToast(msg, type = 'success') {
            const area = document.getElementById('toast-area');
            const id = 'toast-' + Date.now();
            const color = type === 'success' ? 'bg-success' : (type === 'error' ? 'bg-danger' : 'bg-info');
            area.insertAdjacentHTML('beforeend', `
    <div id="${id}" class="toast align-items-center text-white ${color} border-0 show" role="alert">
      <div class="d-flex">
        <div class="toast-body">${msg}</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto"
                onclick="document.getElementById('${id}').remove()"></button>
      </div>
    </div>`);
            setTimeout(() => {
                const t = document.getElementById(id);
                if (t) t.remove();
            }, 4000);
        }
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
